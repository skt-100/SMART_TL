# simulation
gui: true              # نضعها true لرؤية المحاكي أثناء الاختبار
max_steps: 5400        # نفس وقت الجولة في التدريب
n_cars_generated: 1000
green_duration: 25     # يفضل استخدام نفس مدة الأخضر التي تدرب عليها الموديل
yellow_duration: 4
turn_chance: 0.25
seed: 99               # رقم ثابت لضمان تكرار نفس الزحام في كل مرة تختبر فيها

# model (يجب أن تكون مطابقة تماماً لإعدادات التدريب لكي يعمل الموديل)
num_layers: 4
width_layers: 400
learning_rate: 0.001

# agent
gamma: 0.95            # يفضل أن تكون مطابقة للتدريب

# paths
sumocfg_file: "intersection/sumo_config.sumocfg"
model_path: "trained_model.pt"